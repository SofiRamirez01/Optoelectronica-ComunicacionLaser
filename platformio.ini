; Proyecto FSO con dos ESP32:
; - env:tx => Nodo transmisor LASER  (ESP32 DOIT DevKit V1    / COM8)
; - env:rx => Nodo receptor LDR     (ESP32 DevKit WROOM 30p  / COM11)

[env]
platform = espressif32
framework = arduino
board = esp32dev
monitor_speed = 115200

[env:tx]
board = esp32doit-devkit-v1
upload_port = COM8
upload_speed = 115200
monitor_port = COM8
build_src_filter =
	-<*>
	+<main_tx.cpp>
lib_deps =
	bblanchon/ArduinoJson @ ^7.1.0

[env:tx_manual]
board = esp32doit-devkit-v1
upload_port = COM8
upload_speed = 115200
monitor_port = COM8
build_src_filter =
	-<*>
	+<main_tx.cpp>
upload_flags =
	--before
	no_reset
	--after
	hard_reset
lib_deps =
	bblanchon/ArduinoJson @ ^7.1.0

[env:rx]
board = esp32dev
upload_port = COM11
upload_speed = 115200
monitor_port = COM11
build_src_filter =
	-<*>
	+<main_rx.cpp>
lib_deps =
	bblanchon/ArduinoJson @ ^7.1.0

[env:rx_manual]
board = esp32dev
upload_port = COM11
upload_speed = 115200
monitor_port = COM11
build_src_filter =
	-<*>
	+<main_rx.cpp>
upload_flags =
	--before
	no_reset
	--after
	hard_reset
lib_deps =
	bblanchon/ArduinoJson @ ^7.1.0
